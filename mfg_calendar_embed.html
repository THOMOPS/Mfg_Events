<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Manufacturing Events</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: #111827; padding: 20px; }

  /* ── Controls ── */
  .cal-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .ctrl { padding: 7px 12px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: .8rem; background: #fff; outline: none; cursor: pointer; transition: border-color .15s; }
  .ctrl:focus, .ctrl:hover { border-color: #2563eb; }
  input.ctrl { min-width: 200px; }
  .count { font-size: .78rem; color: #6b7280; margin-bottom: 14px; }

  /* ── Month headers ── */
  .month-header { font-size: 1.15rem; font-weight: 800; letter-spacing: -.01em; color: #111827; padding: 22px 0 10px; border-bottom: 2px solid #e5e7eb; margin-bottom: 16px; }

  /* ── Cards ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); grid-auto-rows: 300px; gap: 14px; margin-bottom: 6px; align-items: stretch; }
  .card { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 12px; padding: 16px 18px; display: flex; flex-direction: column; gap: 9px; position: relative; overflow: hidden; transition: box-shadow .15s, border-color .15s, transform .12s; cursor: pointer; }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.07); border-color: #93c5fd; transform: translateY(-2px); }
  .card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 12px 0 0 12px; background: var(--cc, #2563eb); }
  .card.sponsored { grid-column: 1 / -1; padding-left: 72px; border-color: rgba(30,58,138,.35); box-shadow: 0 2px 12px rgba(30,58,138,.12); }
  .card.sponsored::before { width: 56px; background: #1e3a8a; }
  .card.sponsored:hover { border-color: #1e3a8a; box-shadow: 0 6px 20px rgba(30,58,138,.22); }
  .sponsored-banner { position: absolute; left: 0; top: 0; bottom: 0; width: 56px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .sponsored-banner span { writing-mode: vertical-rl; transform: rotate(180deg); font-size: .55rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: #fff; white-space: nowrap; }
  .date-row { display: flex; align-items: center; gap: 10px; }
  .date-box { background: #eff6ff; border-radius: 8px; padding: 5px 9px; text-align: center; min-width: 44px; flex-shrink: 0; }
  .date-mo { font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #2563eb; line-height: 1; }
  .date-dy { font-size: 1.3rem; font-weight: 800; color: #1e3a8a; line-height: 1.1; }
  .date-range { font-size: .72rem; color: #6b7280; line-height: 1.4; }
  .c-name { font-size: .9rem; font-weight: 700; color: #111827; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .c-loc  { font-size: .75rem; color: #4b5563; }
  .c-desc { font-size: .75rem; color: #6b7280; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .c-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; border-top: 1px solid #f3f4f6; }
  .type-badge { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #fff; background: var(--cc, #2563eb); padding: 2px 7px; border-radius: 999px; }
  .c-more-btn { font-size: .72rem; font-weight: 600; color: #2563eb; background: none; border: none; cursor: pointer; padding: 0; }
  .c-more-btn:hover { text-decoration: underline; }
  .loc-country { display: inline-block; font-size: .6rem; font-weight: 700; letter-spacing: .04em; background: #e5e7eb; color: #374151; padding: 1px 5px; border-radius: 4px; vertical-align: middle; margin-right: 3px; }
  .c-meta { display: flex; flex-wrap: wrap; gap: 5px; }
  .c-cat  { font-size: .63rem; font-weight: 600; background: #f3f4f6; color: #374151; padding: 2px 8px; border-radius: 999px; }
  .c-tag  { font-size: .63rem; background: #f3f4f6; color: #6b7280; padding: 2px 8px; border-radius: 999px; }

  /* ── Expanded card ── */
  .card.expanded { grid-column: 1 / -1; grid-row: span 2; border-color: var(--cc); box-shadow: 0 4px 20px rgba(0,0,0,.08); transform: none; cursor: default; }
  .card.expanded:hover { transform: none; border-color: var(--cc); }
  .card.expanded > .date-row { display: none; }
  .card.expanded .c-meta  { display: none; }
  .card.expanded .c-desc  { display: none; }
  .card.expanded .c-loc   { display: none; }
  .card.expanded .c-footer { display: none; }
  /* Expanded header: type + category badges above title */
  .card-exp-header { display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .card.expanded .card-exp-header { display: flex; }
  .exp-type-badge { font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #fff; background: var(--cc, #2563eb); padding: 2px 9px; border-radius: 999px; }
  .exp-cat-badge  { font-size: .63rem; font-weight: 600; background: #f3f4f6; color: #374151; padding: 2px 9px; border-radius: 999px; }
  .card-close { display: none; position: absolute; top: 12px; right: 14px; width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280; font-size: .95rem; line-height: 1; cursor: pointer; align-items: center; justify-content: center; transition: background .12s, color .12s, border-color .12s; z-index: 1; }
  .card.expanded .card-close { display: flex; }
  .card-close:hover { background: #f3f4f6; color: #111827; border-color: #d1d5db; }
  .card-detail { display: none; border-top: 1px solid #f3f4f6; margin-top: 8px; padding-top: 16px; }
  .card.expanded .card-detail { display: grid; grid-template-columns: 1fr 2fr; gap: 0 28px; }
  .det-label { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #9ca3af; margin-bottom: 6px; }
  .det-section { margin-bottom: 16px; }
  .det-section:last-child { margin-bottom: 0; }
  .det-airport { font-size: .65rem; font-weight: 700; background: #eff6ff; color: #1e40af; padding: 2px 7px; border-radius: 999px; letter-spacing: .03em; }
  .det-tag { font-size: .68rem; background: #f3f4f6; color: #374151; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
  .det-cta { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 16px; background: #1e3a8a; color: #fff; border-radius: 8px; font-size: .88rem; font-weight: 700; text-decoration: none; margin-top: 16px; width: 100%; }
  .det-cta:hover { opacity: .88; }
  /* ── Dimmed cards ── */
  .card.dimmed { opacity: .35; pointer-events: none; transition: opacity .2s; }
  .card.dimmed:hover { transform: none; box-shadow: none; }

  /* ── Status badges ── */
  .status-badge { display: inline-block; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 7px; border-radius: 999px; }
  .sb-date-tbd { background: #fef9c3; color: #854d0e; }

  /* ── Empty / loading / error ── */
  .empty   { text-align: center; padding: 60px 20px; color: #9ca3af; font-size: .875rem; }
  .loading { text-align: center; padding: 60px 20px; color: #6b7280; font-size: .875rem; }
  .error-banner { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; font-size: .82rem; color: #991b1b; }

  /* ── Ad tiles (live in the grid) ── */
  .ad-card { position: relative; border-radius: 12px; overflow: hidden; text-decoration: none; display: block; background: #1a1a2e; height: 100%; }
  .ad-card-full { grid-column: 1 / -1; }
  .ad-bg { position: absolute; inset: -20px; width: calc(100% + 40px); height: calc(100% + 40px); object-fit: cover; filter: blur(14px); transform: scale(1.05); opacity: .85; }
  .ad-fg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
  .ad-card-label { position: absolute; top: 8px; right: 10px; font-size: .58rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; background: rgba(255,255,255,.88); padding: 2px 7px; border-radius: 6px; }

  @media (max-width: 560px) {
    .card.expanded .card-detail { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="cal-controls">
  <input  class="ctrl" type="search" id="calQ"       placeholder="Search events..." oninput="renderCalendar()">
  <select class="ctrl" id="calType"    onchange="renderCalendar()">
    <option value="">All types</option>
    <option value="trade show">Trade Shows</option>
    <option value="conference">Conferences</option>
    <option value="webinar">Webinars</option>
  </select>
  <select class="ctrl" id="calCat"     onchange="renderCalendar()"></select>
  <select class="ctrl" id="calCountry" onchange="renderCalendar()"></select>
</div>
<div class="count" id="calCount"></div>
<div id="calBody"><div class="loading">Loading events&hellip;</div></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const GITHUB_RAW = "https://raw.githubusercontent.com/THOMOPS/Mfg_Events/main/";

// ── State ────────────────────────────────────────────────────────────────────
let EVENTS = [], VENUES = [], ADS = [];
let DEV_MODE = false;
let expandedId = null;

// ── Constants ────────────────────────────────────────────────────────────────
const MO      = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MO_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const TYPE_COLORS = { "trade show": "#2563eb", "conference": "#7c3aed", "webinar": "#059669" };

function typeColor(t){ return TYPE_COLORS[t] || "#374151"; }
function esc(s){ return s ? String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;") : ""; }
function safeUrl(u){ const s = String(u||"").trim(); return /^https?:\/\//i.test(s) ? esc(s) : ""; }
function getVenue(id){ return VENUES.find(v => v.ven_id === id) || null; }

// ── Data loading ─────────────────────────────────────────────────────────────
async function fetchJson(file){
  const res = await fetch(GITHUB_RAW + file + "?t=" + Date.now());
  if(!res.ok) throw new Error("Failed to load " + file);
  return res.json();
}

async function loadData(){
  try {
    const [eventsData, venuesData, adsData] = await Promise.all([
      fetchJson("mfg_events.json"),
      fetchJson("mfg_venues.json"),
      fetchJson("mfg_ads.json").catch(() => ({ ads: [] }))
    ]);
    if(DEV_MODE) return;
    EVENTS = eventsData.events  || [];
    VENUES = venuesData.venues  || [];
    ADS    = adsData.ads        || [];
    initFilters();
    renderCalendar();
  } catch(err){
    if(DEV_MODE) return;
    document.getElementById("calBody").innerHTML =
      `<div class="error-banner">Unable to load events. Please try refreshing the page.</div>`;
    console.error(err);
  }
}

// ── Filters ──────────────────────────────────────────────────────────────────
function initFilters(){
  const cats = [...new Set(EVENTS.map(e => e.category).filter(Boolean))].sort();
  document.getElementById("calCat").innerHTML =
    '<option value="">All categories</option>' +
    cats.map(c => `<option value="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join("");

  const venueMap = Object.fromEntries(VENUES.map(v => [v.ven_id, v]));
  const countries = [...new Set(EVENTS.map(e => e.venue_id ? (venueMap[e.venue_id]||{}).country : null).filter(Boolean))].sort();
  document.getElementById("calCountry").innerHTML =
    '<option value="">All countries</option>' +
    countries.map(c => `<option value="${c}">${c}</option>`).join("");
}

// ── Calendar rendering ────────────────────────────────────────────────────────
function renderCalendar(){
  expandedId = null;
  const q       = document.getElementById("calQ").value.toLowerCase();
  const type    = document.getElementById("calType").value;
  const cat     = document.getElementById("calCat").value;
  const country = document.getElementById("calCountry").value;

  const today = new Date(); today.setHours(0,0,0,0);

  let evs = EVENTS.filter(e => {
    if(e.status === "cancelled" || e.status === "inactive") return false;
    if(new Date(e.end_date + "T00:00:00") < today) return false;
    if(type    && e.type     !== type)    return false;
    if(cat     && e.category !== cat)     return false;
    if(country){ const v=getVenue(e.venue_id); if(!v || v.country !== country) return false; }
    if(q){
      const v = getVenue(e.venue_id);
      const hay = [e.name, e.description, v&&v.city, v&&v.state, v&&v.country, ...(e.tags||[])].filter(Boolean).join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  }).sort((a,b) => a.start_date.localeCompare(b.start_date));

  document.getElementById("calCount").textContent =
    `Showing ${evs.length} event${evs.length!==1?"s":""}`;

  if(!evs.length){
    document.getElementById("calBody").innerHTML =
      '<div class="empty">No events match your filters.</div>';
    return;
  }

  const byMonth = {};
  evs.forEach(e => { const k = e.start_date.slice(0,7); (byMonth[k]=byMonth[k]||[]).push(e); });

  let html = "";
  for(const [k, grp] of Object.entries(byMonth)){
    const [yr, mo] = k.split("-");
    html += `<div class="month-header">${MO_FULL[+mo-1]} ${yr}</div><div class="grid">`;
    grp.forEach(e => { html += calCard(e); });
    getActiveAdsForMonth(k).forEach(a => { html += adCardHtml(a); });
    html += "</div>";
  }
  document.getElementById("calBody").innerHTML = html;
}

function calCard(e){
  const color = typeColor(e.type);
  const venue = getVenue(e.venue_id);
  const s  = new Date(e.start_date+"T00:00:00");
  const en = new Date(e.end_date+"T00:00:00");
  const sd=s.getDate(), sm=s.getMonth(), ed=en.getDate(), em=en.getMonth();
  const range = (sm===em&&sd!==ed)
    ? `${MO[sm]} ${sd}&ndash;${ed}, ${s.getFullYear()}`
    : `${MO[sm]} ${sd} &ndash; ${MO[em]} ${ed}, ${en.getFullYear()}`;
  const days  = Math.round((en-s)/(1000*60*60*24))+1;
  const cc    = venue ? (venue.country==="USA"?"US":venue.country==="Canada"?"CA":venue.country?(venue.country.slice(0,2).toUpperCase()):"") : "";
  const flag  = cc ? `<span class="loc-country">${cc}</span>` : "";
  const loc   = venue ? `${esc(venue.city)}, ${esc(venue.state)}` : "";
  const tbd   = e.status==="date-tbd" ? ' <span class="status-badge sb-date-tbd">Date TBD</span>' : "";
  const sponsoredClass  = e.sponsored ? " sponsored" : "";
  const sponsoredBanner = e.sponsored ? `<div class="sponsored-banner"><span>Featured Event</span></div>` : "";

  // Detail section (hidden until expanded)
  const airports = (venue&&venue.airports||[]).map(a=>`<span class="det-airport">${esc(a.code)}</span>`).join(" ");
  const detTags  = (e.tags||[]).map(t=>`<span class="det-tag">${esc(t)}</span>`).join(" ");
  const cat      = e.category ? e.category.charAt(0).toUpperCase()+e.category.slice(1) : "";

  const detailLeft = `
    <div class="det-section">
      <div class="det-label">Dates</div>
      <div class="date-row" style="margin-top:6px">
        <div class="date-box"><div class="date-mo">${MO[sm]}</div><div class="date-dy">${sd}</div></div>
        <div>
          <div style="font-size:.8rem;color:#374151">${range}${tbd ? `<span class="status-badge sb-date-tbd" style="margin-left:6px">Date TBD</span>` : ""}</div>
          <div style="font-size:.72rem;color:#9ca3af;margin-top:2px">${days} day${days!==1?"s":""}</div>
        </div>
      </div>
    </div>
    ${venue ? `<div class="det-section">
      <div class="det-label">Location</div>
      <div style="font-size:.82rem;font-weight:600;color:#111827;margin-top:4px">${flag} ${esc(venue.city)}, ${esc(venue.state)} &middot; ${esc(venue.country||"")}</div>
      <div style="font-size:.75rem;color:#6b7280;margin-top:2px">${esc(venue.name)}</div>
    </div>` : ""}
    ${airports ? `<div class="det-section"><div class="det-label">Nearby airports</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">${airports}</div></div>` : ""}
    ${detTags ? `<div class="det-section"><div class="det-label">Tags</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">${detTags}</div></div>` : ""}`;

  const detailRight = `
    ${e.description ? `<div class="det-section"><div class="det-label">About</div><div style="font-size:.82rem;color:#374151;line-height:1.7;margin-top:4px">${esc(e.description)}</div></div>` : ""}
    ${safeUrl(e.url) ? `<a class="det-cta" href="${safeUrl(e.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Visit event website &#8599;</a>` : ""}`;

  return `<div class="card${sponsoredClass}" id="card-${esc(e.evt_id)}" style="--cc:${color}" onclick="toggleCard('${esc(e.evt_id)}')">
    <button class="card-close" onclick="event.stopPropagation();collapseCard('${esc(e.evt_id)}')" aria-label="Close">&times;</button>
    ${sponsoredBanner}
    <div class="date-row">
      <div class="date-box"><div class="date-mo">${MO[sm]}</div><div class="date-dy">${sd}</div></div>
      <div class="date-range">${range}${tbd}</div>
    </div>
    <div class="card-exp-header">
      <span class="exp-type-badge">${esc(e.type)}</span>
      ${cat ? `<span class="exp-cat-badge">${esc(cat)}</span>` : ""}
    </div>
    <div class="c-name">${esc(e.name)}</div>
    ${cat ? `<div class="c-meta"><span class="c-cat">${esc(cat)}</span></div>` : ""}
    ${loc ? `<div class="c-loc">${flag} ${loc}</div>` : ""}
    ${e.description ? `<div class="c-desc">${esc(e.description)}</div>` : ""}
    <div class="c-footer">
      <span class="type-badge">${esc(e.type)}</span>
      <button class="c-more-btn" onclick="event.stopPropagation();toggleCard('${esc(e.evt_id)}')">See more</button>
    </div>
    <div class="card-detail">
      <div>${detailLeft}</div>
      <div>${detailRight}</div>
    </div>
  </div>`;
}

// ── Card expand / collapse ────────────────────────────────────────────────────
function toggleCard(evtId){
  if(expandedId === evtId){ collapseCard(evtId); return; }
  if(expandedId) collapseCard(expandedId);
  expandCard(evtId);
}

function expandCard(evtId){
  const card = document.getElementById("card-" + evtId);
  if(!card) return;
  card.classList.add("expanded");
  // Dim all sibling cards in the same grid
  const grid = card.closest(".grid");
  if(grid) grid.querySelectorAll(".card:not(.expanded)").forEach(c => c.classList.add("dimmed"));
  expandedId = evtId;
}

function collapseCard(evtId){
  const card = document.getElementById("card-" + evtId);
  if(!card) return;
  card.classList.remove("expanded");
  // Remove dimming from all cards
  const grid = card.closest(".grid");
  if(grid) grid.querySelectorAll(".card").forEach(c => c.classList.remove("dimmed"));
  expandedId = null;
}

// ── Ad tiles ──────────────────────────────────────────────────────────────────
function getActiveAdsForMonth(monthKey){
  const today = new Date().toISOString().slice(0,10);
  return ADS.filter(a =>
    a.status === "active" &&
    (a.after_months||[]).includes(monthKey) &&
    a.start_date <= today &&
    a.end_date   >= today
  );
}

function adCardHtml(a){
  const cls = a.width === "tile" ? "ad-card" : "ad-card ad-card-full";
  let media = "";
  if(a.media_type === "video" && a.video_url){
    media = `<video class="ad-fg" src="${esc(a.video_url)}" autoplay muted loop playsinline></video>`;
  } else if(a.image_url){
    media = `<img class="ad-bg" src="${esc(a.image_url)}" alt=""/>
             <img class="ad-fg" src="${esc(a.image_url)}" alt=""/>`;
  }
  return `<a class="${cls}" href="${safeUrl(a.link_url)}" target="_blank" rel="noopener sponsored">
    ${media}
    <span class="ad-card-label">Paid Ad</span>
  </a>`;
}

// ── Accept local data override from admin Dev tab ─────────────────────────────
window.addEventListener("message", function(e){
  if(e.data && e.data.type === "MFG_DEV_DATA"){
    DEV_MODE = true;
    EVENTS = e.data.events || [];
    VENUES = e.data.venues || [];
    ADS    = e.data.ads    || [];
    // Resolve transferred video ArrayBuffers into local blob URLs.
    // Parent-frame blob URLs can't cross file:// origins, so video data is sent as ArrayBuffers.
    const transfers = e.data.videoTransfers || {};
    for(const [adId, buf] of Object.entries(transfers)){
      if(!buf || !buf.byteLength) continue;
      const ad = ADS.find(a => a.ad_id === adId);
      if(!ad) continue;
      const ext      = (ad.video_url || "").split(".").pop().toLowerCase();
      const mimeType = ext === "webm" ? "video/webm" : "video/mp4";
      ad.video_url   = URL.createObjectURL(new Blob([buf], { type: mimeType }));
    }
    initFilters();
    renderCalendar();
  }
});

// ── Auto-resize (reports height to parent for iframe embed) ───────────────────
function reportHeight(){
  window.parent.postMessage({ type: "MFG_RESIZE", height: document.body.scrollHeight }, "*");
}
new ResizeObserver(reportHeight).observe(document.body);

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
